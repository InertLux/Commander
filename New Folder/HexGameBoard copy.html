<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex Game Board - Tactical OS</title>
    <style>
        /* TACTICAL_OS_CORE */
        :root {
            --grn: #0f0;
            --bg: #000;
            --win: #222;
            --out: #eee #555 #555 #eee;
            --ins: #555 #eee #eee #555;
            --hex-grass: #0a6b0a;
            --hex-water: #0a3a6b;
            --hex-sand: #6b5a0a;
            --hex-forest: #073d07;
            --hex-mountain: #3a3a3a;
            --hex-neutral: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--grn);
            font: 11px "Courier New", monospace;
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
            margin: 0;
        }

        .outset {
            border: 2px solid;
            border-color: var(--out);
            background: var(--win);
            padding: 4px;
        }

        .inset {
            border: 2px solid;
            border-color: var(--ins);
            background: var(--bg);
            padding: 2px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border-right: 2px solid #555;
            padding: 8px;
            background: var(--bg);
        }

        .controls h3 {
            color: var(--grn);
            margin: 8px 0 4px 0;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls h3:first-child {
            margin-top: 0;
        }

        .controls p {
            font-size: 10px;
            color: #888;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .controls textarea {
            width: 100%;
            height: 120px;
            background: var(--bg);
            border: 2px solid;
            border-color: var(--ins);
            color: var(--grn);
            font-family: "Courier New", monospace;
            font-size: 9px;
            padding: 4px;
            resize: vertical;
            margin: 4px 0;
        }

        .controls textarea:focus {
            outline: none;
            border-color: var(--out);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin: 6px 0;
        }

        .controls button {
            background: var(--win);
            color: var(--grn);
            border: 2px solid;
            border-color: var(--out);
            padding: 4px 6px;
            font-family: "Courier New", monospace;
            font-size: 10px;
            cursor: pointer;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .controls button:active {
            border-color: var(--ins);
        }

        .controls button.danger {
            color: #f44;
        }

        .controls button.danger:active {
            background: #500;
        }

        .controls button.secondary {
            color: #0af;
        }

        .controls button.secondary:active {
            background: #004;
        }

        .info-text {
            font-size: 9px;
            color: #888;
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid #444;
            line-height: 1.4;
        }

        .info-text strong {
            color: var(--grn);
        }

        input[type="file"] {
            display: none;
        }

        .board-container {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }

        .perspective-wrapper {
            transform: perspective(1500px) rotateX(25deg) rotateZ(-5deg);
            transform-style: preserve-3d;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hex-grid {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--bg);
        }

        .hex {
            position: absolute;
            width: 32px;
            height: 37px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .hex-inner {
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: bold;
            text-align: center;
            position: relative;
            border: 1px solid #111;
            transition: all 0.15s ease;
        }

        /* Terrain colors - darkened tactical palette */
        .hex.grass .hex-inner {
            background: var(--hex-grass);
            color: var(--grn);
        }

        .hex.water .hex-inner {
            background: var(--hex-water);
            color: #0af;
        }

        .hex.sand .hex-inner {
            background: var(--hex-sand);
            color: var(--grn);
        }

        .hex.forest .hex-inner {
            background: var(--hex-forest);
            color: var(--grn);
        }

        .hex.mountain .hex-inner {
            background: var(--hex-mountain);
            color: #888;
        }

        .hex.neutral .hex-inner {
            background: var(--hex-neutral);
            color: #444;
        }

        /* Disabled state */
        .hex.disabled .hex-inner {
            background: var(--bg) !important;
            color: #333;
            opacity: 0.4;
            border-color: #222;
        }

        /* Hover state */
        .hex:hover:not(.disabled) .hex-inner {
            filter: brightness(1.3);
            box-shadow: inset 0 0 4px rgba(0, 255, 0, 0.3);
        }

        /* Selected state */
        .hex.selected .hex-inner {
            box-shadow: inset 0 0 0 2px var(--grn);
        }

        .hex-resource {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 6px;
            height: 6px;
            background: rgba(0, 255, 0, 0.2);
            border-radius: 50%;
            font-size: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            color: rgba(0, 255, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="controls">
        <h3>● Mask Editor</h3>
        <p>Click hexes to toggle (1=render, 0=skip)</p>
        <textarea id="maskInput" placeholder="19x19 binary array&#10;1 = render hex&#10;0 = skip hex">1111111111111111111
0111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111000011111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111110</textarea>
        
        <h3>● Controls</h3>
        <div class="button-group">
            <button onclick="applyMask()">[ Apply ]</button>
            <button class="secondary" onclick="downloadMask()">[ Download ]</button>
        </div>
        <div class="button-group">
            <button class="secondary" onclick="document.getElementById('fileInput').click()">[ Load ]</button>
            <button class="danger" onclick="clearMask()">[ Clear All ]</button>
            <button class="danger" onclick="fillMask()">[ Fill All ]</button>
        </div>

        <input type="file" id="fileInput" accept=".txt,.mask" />

        <div class="info-text">
            <strong>TIP:</strong> Click tiles to toggle. Use controls to save/load masks.
        </div>
    </div>

    <div class="board-container">
        <div class="perspective-wrapper">
            <div class="hex-grid" id="hexGrid"></div>
        </div>
    </div>

    <script>
        const hexGrid = document.getElementById('hexGrid');
        const terrainTypes = ['grass', 'water', 'sand', 'forest', 'mountain', 'neutral'];

        // Hex dimensions
        const hexWidth = 32;
        const hexHeight = 37;
        const gap = 4;

        // Pointy-top hex spacing math
        const hexSpacingX = hexWidth + gap;
        const hexSpacingY = (hexHeight * 0.75) + gap;

        const gridSize = 19;

        // Default mask: all 1s (render all hexes)
        let shapeMask = Array(gridSize).fill(null).map(() => Array(gridSize).fill(1));
        
        // Store hex references for toggling
        let hexMap = {};

        function generateHexes(mask) {
            hexGrid.innerHTML = '';
            hexMap = {};

            // Grid center
            const gridCenterX = hexGrid.offsetWidth / 2;
            const gridCenterY = hexGrid.offsetHeight / 2;

            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    // Offset-coordinate calculation
                    let x = col * hexSpacingX;
                    let y = row * hexSpacingY;

                    // Offset even rows
                    if (row % 2 === 1) {
                        x += hexSpacingX / 2;
                    }

                    // Center the grid
                    const offsetX = (gridCenterX - (gridSize * hexSpacingX) / 2);
                    const offsetY = (gridCenterY - (gridSize * hexSpacingY) / 2);

                    const hex = document.createElement('div');
                    const terrain = terrainTypes[Math.floor(Math.random() * terrainTypes.length)];

                    hex.className = `hex ${terrain}`;
                    hex.style.left = (offsetX + x) + 'px';
                    hex.style.top = (offsetY + y) + 'px';
                    hex.innerHTML = `
                        <div class="hex-inner"></div>
                        <div class="hex-resource">●</div>
                    `;

                    // Check if disabled based on mask
                    if (!mask[row] || !mask[row][col] || mask[row][col] === 0) {
                        hex.classList.add('disabled');
                    }

                    hex.addEventListener('click', function(e) {
                        e.stopPropagation();
                        toggleHexMask(row, col);
                    });

                    hexGrid.appendChild(hex);
                    hexMap[`${row},${col}`] = hex;
                }
            }
        }

        function toggleHexMask(row, col) {
            // Toggle the mask value
            shapeMask[row][col] = shapeMask[row][col] ? 0 : 1;
            
            // Update the hex visual
            const hex = hexMap[`${row},${col}`];
            if (hex) {
                hex.classList.toggle('disabled');
            }

            // Update the textarea to reflect changes
            updateTextarea();
        }

        function updateTextarea() {
            const maskText = shapeMask.map(row => row.join('')).join('\n');
            document.getElementById('maskInput').value = maskText;
        }

        function applyMask() {
            const input = document.getElementById('maskInput').value;
            const lines = input.trim().split('\n');

            // Parse the mask array from textarea
            const newMask = lines.map(line => 
                line.split('').map(char => parseInt(char) || 0)
            );

            // Validate dimensions
            if (newMask.length !== gridSize) {
                alert(`Mask must have ${gridSize} rows`);
                return;
            }

            if (!newMask.every(row => row.length === gridSize)) {
                alert(`Each row must have ${gridSize} values`);
                return;
            }

            shapeMask = newMask;
            generateHexes(shapeMask);
        }

        function downloadMask() {
            const maskText = shapeMask.map(row => row.join('')).join('\n');
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(maskText));
            element.setAttribute('download', `hex-mask-${Date.now()}.txt`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        function loadMask(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                document.getElementById('maskInput').value = content;
                applyMask();
            };
            reader.readAsText(file);
        }

        function clearMask() {
            if (confirm('Clear all hexes?')) {
                shapeMask = Array(gridSize).fill(null).map(() => Array(gridSize).fill(0));
                updateTextarea();
                generateHexes(shapeMask);
            }
        }

        function fillMask() {
            shapeMask = Array(gridSize).fill(null).map(() => Array(gridSize).fill(1));
            updateTextarea();
            generateHexes(shapeMask);
        }

        // File input handler
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                loadMask(e.target.files[0]);
            }
        });

        // Initial render with full grid
        generateHexes(shapeMask);
    </script>
</body>
</html>

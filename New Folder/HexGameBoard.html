<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex Game Board - Proper Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #2a2a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            padding: 20px;
            perspective: 1200px;
        }

        .board-container {
            width: 800px;
            height: 800px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .perspective-wrapper {
            transform: perspective(1500px) rotateX(25deg) rotateZ(-5deg);
            transform-style: preserve-3d;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hex-grid {
            position: relative;
            width: 100%;
            height: 100%;
            background: #0f0f0f;
            border-radius: 4px;
        }

        .hex {
            position: absolute;
            width: 32px;
            height: 37px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .hex-inner {
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: bold;
            text-align: center;
            transition: all 0.2s ease;
            position: relative;
        }

        /* Terrain colors */
        .hex.grass .hex-inner {
            background: #7cb342;
            color: #fff;
        }

        .hex.water .hex-inner {
            background: #1976d2;
            color: #fff;
        }

        .hex.sand .hex-inner {
            background: #d4a574;
            color: #333;
        }

        .hex.forest .hex-inner {
            background: #2e7d32;
            color: #fff;
        }

        .hex.mountain .hex-inner {
            background: #757575;
            color: #fff;
        }

        .hex.neutral .hex-inner {
            background: #424242;
            color: #999;
        }

        /* Disabled state */
        .hex.disabled .hex-inner {
            background: #1a1a1a !important;
            color: #444;
            opacity: 0.3;
        }

        /* Hover state */
        .hex:hover .hex-inner {
            filter: brightness(1.15);
            transform: scale(1.08);
            z-index: 10;
        }

        .hex.disabled:hover .hex-inner {
            filter: brightness(0.9);
        }

        /* Selected state */
        .hex.selected .hex-inner {
            box-shadow: inset 0 0 0 2px #ffd700;
        }

        .hex-resource {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            font-size: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-radius: 4px;
            color: #ccc;
            font-size: 12px;
            max-width: 300px;
            z-index: 100;
            max-height: 95vh;
            overflow-y: auto;
        }

        .controls textarea {
            width: 100%;
            height: 100px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 8px;
            border-radius: 3px;
            margin: 8px 0;
            resize: vertical;
        }

        .controls button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            margin-right: 5px;
            margin-top: 5px;
            display: inline-block;
        }

        .controls button:hover {
            background: #45a049;
        }

        .controls button.secondary {
            background: #2196F3;
        }

        .controls button.secondary:hover {
            background: #0b7dda;
        }

        .controls button.danger {
            background: #f44336;
        }

        .controls button.danger:hover {
            background: #da190b;
        }

        .controls h3 {
            margin-bottom: 8px;
            color: #fff;
            margin-top: 12px;
        }

        .controls h3:first-child {
            margin-top: 0;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }

        .info-text {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #444;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h3>Mask Editor</h3>
        <p style="font-size: 11px; color: #aaa; margin-bottom: 8px;">Click hexes to toggle (1=render, 0=skip)</p>
        <textarea id="maskInput" placeholder="19x19 binary array&#10;1 = render hex&#10;0 = skip hex">1111111111111111111
0111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111000011111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111111
1111111111111111110</textarea>
        
        <h3>Controls</h3>
        <div class="button-group">
            <button onclick="applyMask()">Apply Mask</button>
            <button class="secondary" onclick="downloadMask()">Download</button>
        </div>
        <div class="button-group">
            <button class="secondary" onclick="document.getElementById('fileInput').click()">Load</button>
            <button class="danger" onclick="clearMask()">Clear All</button>
            <button class="danger" onclick="fillMask()">Fill All</button>
        </div>

        <input type="file" id="fileInput" accept=".txt,.mask" />

        <div class="info-text">
            <strong>Tip:</strong> Click tiles on the board to toggle them on/off. Use controls to save/load masks.
        </div>
    </div>

    <div class="board-container">
        <div class="perspective-wrapper">
            <div class="hex-grid" id="hexGrid"></div>
        </div>
    </div>

    <script>
        const hexGrid = document.getElementById('hexGrid');
        const terrainTypes = ['grass', 'water', 'sand', 'forest', 'mountain', 'neutral'];

        // Hex dimensions
        const hexWidth = 32;
        const hexHeight = 37;
        const gap = 4;

        // Pointy-top hex spacing math
        const hexSpacingX = hexWidth + gap;
        const hexSpacingY = (hexHeight * 0.75) + gap;

        const gridSize = 19;

        // Default mask: all 1s (render all hexes)
        let shapeMask = Array(gridSize).fill(null).map(() => Array(gridSize).fill(1));
        
        // Store hex references for toggling
        let hexMap = {};

        function generateHexes(mask) {
            hexGrid.innerHTML = '';
            hexMap = {};

            // Grid center
            const gridCenterX = hexGrid.offsetWidth / 2;
            const gridCenterY = hexGrid.offsetHeight / 2;

            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    // Offset-coordinate calculation
                    let x = col * hexSpacingX;
                    let y = row * hexSpacingY;

                    // Offset even rows
                    if (row % 2 === 1) {
                        x += hexSpacingX / 2;
                    }

                    // Center the grid
                    const offsetX = (gridCenterX - (gridSize * hexSpacingX) / 2);
                    const offsetY = (gridCenterY - (gridSize * hexSpacingY) / 2);

                    const hex = document.createElement('div');
                    const terrain = terrainTypes[Math.floor(Math.random() * terrainTypes.length)];

                    hex.className = `hex ${terrain}`;
                    hex.style.left = (offsetX + x) + 'px';
                    hex.style.top = (offsetY + y) + 'px';
                    hex.innerHTML = `
                        <div class="hex-inner"></div>
                        <div class="hex-resource">●</div>
                    `;

                    // Check if disabled based on mask
                    if (!mask[row] || !mask[row][col] || mask[row][col] === 0) {
                        hex.classList.add('disabled');
                    }

                    hex.addEventListener('click', function(e) {
                        e.stopPropagation();
                        toggleHexMask(row, col);
                    });

                    hexGrid.appendChild(hex);
                    hexMap[`${row},${col}`] = hex;
                }
            }
        }

        function toggleHexMask(row, col) {
            // Toggle the mask value
            shapeMask[row][col] = shapeMask[row][col] ? 0 : 1;
            
            // Update the hex visual
            const hex = hexMap[`${row},${col}`];
            if (hex) {
                hex.classList.toggle('disabled');
            }

            // Update the textarea to reflect changes
            updateTextarea();
        }

        function updateTextarea() {
            const maskText = shapeMask.map(row => row.join('')).join('\n');
            document.getElementById('maskInput').value = maskText;
        }

        function applyMask() {
            const input = document.getElementById('maskInput').value;
            const lines = input.trim().split('\n');

            // Parse the mask array from textarea
            const newMask = lines.map(line => 
                line.split('').map(char => parseInt(char) || 0)
            );

            // Validate dimensions
            if (newMask.length !== gridSize) {
                alert(`Mask must have ${gridSize} rows`);
                return;
            }

            if (!newMask.every(row => row.length === gridSize)) {
                alert(`Each row must have ${gridSize} values`);
                return;
            }

            shapeMask = newMask;
            generateHexes(shapeMask);
        }

        function downloadMask() {
            const maskText = shapeMask.map(row => row.join('')).join('\n');
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(maskText));
            element.setAttribute('download', `hex-mask-${Date.now()}.txt`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        function loadMask(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                document.getElementById('maskInput').value = content;
                applyMask();
            };
            reader.readAsText(file);
        }

        function clearMask() {
            if (confirm('Clear all hexes?')) {
                shapeMask = Array(gridSize).fill(null).map(() => Array(gridSize).fill(0));
                updateTextarea();
                generateHexes(shapeMask);
            }
        }

        function fillMask() {
            shapeMask = Array(gridSize).fill(null).map(() => Array(gridSize).fill(1));
            updateTextarea();
            generateHexes(shapeMask);
        }

        // File input handler
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                loadMask(e.target.files[0]);
            }
        });

        // Initial render with full grid
        generateHexes(shapeMask);
    </script>
</body>
</html>

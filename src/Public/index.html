<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            width: 90vw;
            height: 90vh;
            max-width: 1200px;
            max-height: 1200px;
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 150, 0.05) 0%, rgba(10, 14, 39, 1) 100%);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid rgba(0, 255, 200, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.2), 
                        inset 0 0 30px rgba(0, 255, 200, 0.05);
        }

        .grid-item {
            background: linear-gradient(135deg, rgba(0, 255, 200, 0.1) 0%, rgba(100, 200, 255, 0.05) 100%);
            border: 2px solid rgba(0, 255, 150, 0.5);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            color: #00ff9f;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 200, 0.3),
                        inset 0 0 15px rgba(0, 255, 150, 0.1);
        }

        .grid-item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(0, 255, 200, 0.1) 50%, 
                transparent 70%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translate(-100%, -100%) rotate(0deg);
            }
            100% {
                transform: translate(100%, 100%) rotate(0deg);
            }
        }

        .grid-item:hover {
            background: linear-gradient(135deg, rgba(0, 255, 200, 0.2) 0%, rgba(100, 200, 255, 0.1) 100%);
            border-color: rgba(0, 255, 150, 0.8);
            box-shadow: 0 0 25px rgba(0, 255, 200, 0.6),
                        0 0 40px rgba(100, 200, 255, 0.3),
                        inset 0 0 20px rgba(0, 255, 150, 0.2);
            transform: scale(1.02);
        }

        .grid-item:active {
            box-shadow: 0 0 35px rgba(0, 255, 200, 0.8),
                        0 0 60px rgba(100, 200, 255, 0.5),
                        inset 0 0 25px rgba(0, 255, 150, 0.3);
        }

        holo-button {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid-item"><holo-button url="/frame/Character" icon="android-mask.svg" size="64" icon-color="yellow">  </holo-button></div>
        <div class="grid-item"><holo-button url="./Simulator/Combat.html" icon="assassin-pocket.svg" size="64" icon-color="yellow">  </holo-button></div>
        <div class="grid-item"><holo-button url="./Simulator/Inventory.html" icon="swap-bag.svg" size="64" icon-color="yellow">  </holo-button></div>
        <div class="grid-item"><holo-button url="./Simulator/CharacterInfo.html" icon="key.svg" size="64" icon-color="yellow">  </holo-button></div>
        <div class="grid-item"><holo-button url="./Simulator/Character.html" icon="ancient-sword.svg" size="64" icon-color="yellow">  </holo-button></div>
        <div class="grid-item"><holo-button url="./Simulator/Character.html" icon="ancient-sword.svg" size="64" icon-color="yellow">  </holo-button></div>
        <div class="grid-item"><holo-button url="./Simulator/Character.html" icon="ancient-sword.svg" size="64" icon-color="yellow">  </holo-button></div>
        <div class="grid-item"><holo-button url="./Simulator/Character.html" icon="ancient-sword.svg" size="64" icon-color="yellow">  </holo-button></div>
        <div class="grid-item"><holo-button url="./Simulator/Character.html" icon="ancient-sword.svg" size="64" icon-color="yellow">  </holo-button></div>
    
    </div>

    <script type="module" src="WebComponents/Button/HoloButton.js"></script>
</body>
</html>

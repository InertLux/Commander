<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyUI Inventory - Holo Green</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #0d0d0d 100%);
            color: #00ff41;
            line-height: 1.5;
            padding: 20px;
        }

        .inventory-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid #00ff41;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.2), inset 0 0 20px rgba(0, 255, 65, 0.05);
            padding: 0;
            display: flex;
            min-height: 90vh;
            gap: 0;
        }

        .sidebar {
            width: 220px;
            background: linear-gradient(90deg, rgba(10, 20, 10, 0.95) 0%, rgba(8, 15, 8, 0.95) 100%);
            border-right: 1px solid rgba(0, 255, 65, 0.3);
            padding: 20px 0;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 0.75em;
            color: #00ff41;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 15px 15px 10px 15px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.2);
            margin-bottom: 10px;
            font-weight: bold;
            opacity: 0.8;
        }

        .category-btn {
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            background: transparent;
            border: none;
            border-left: 3px solid transparent;
            color: #00aa00;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.2s;
            font-family: inherit;
        }

        .category-btn:hover {
            background: rgba(0, 255, 65, 0.08);
            color: #00ff41;
        }

        .category-btn.active {
            border-left-color: #00ff41;
            background: rgba(0, 255, 65, 0.12);
            color: #00ff41;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
        }

        .sort-btn {
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            background: transparent;
            border: none;
            border-left: 3px solid transparent;
            color: #00aa00;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.2s;
            font-family: inherit;
        }

        .sort-btn:hover {
            background: rgba(0, 255, 65, 0.08);
            color: #00ff41;
        }

        .sort-btn.active {
            border-left-color: #00ff41;
            background: rgba(0, 255, 65, 0.12);
            color: #00ff41;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
        }

        .main-content {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .inventory-header {
            border-bottom: 2px solid #00ff41;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .inventory-header h1 {
            font-size: 1.8em;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
            margin-bottom: 5px;
        }

        .inventory-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            font-size: 0.85em;
            opacity: 0.9;
        }

        .stat-line {
            border-right: 1px dashed rgba(0, 255, 65, 0.3);
            padding-right: 15px;
        }

        .stat-line:last-child {
            border-right: none;
        }

        .stat-label {
            opacity: 0.7;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.1em;
            color: #00ff41;
        }

        .weight-bar {
            height: 8px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 2px;
            overflow: hidden;
        }

        .weight-bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
            background: linear-gradient(90deg, #00ff41, #00cc33);
        }

        .inventory-list {
            flex: 1;
            overflow-y: auto;
            border: 1px solid rgba(0, 255, 65, 0.3);
            background: rgba(0, 255, 65, 0.02);
            padding: 0;
        }

        .inventory-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.15);
            display: grid;
            grid-template-columns: 1fr 80px 80px 120px;
            gap: 15px;
            align-items: center;
            font-size: 0.9em;
            transition: background 0.2s;
            cursor: pointer;
        }

        .inventory-item:hover {
            background: rgba(0, 255, 65, 0.08);
        }

        .inventory-item.equipped {
            background: rgba(0, 255, 65, 0.05);
            border-left: 3px solid #00ff41;
        }

        .item-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .item-icon {
            width: 20px;
            height: 20px;
            background: rgba(0, 255, 65, 0.2);
            border: 1px solid #00ff41;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
        }

        .item-weight {
            text-align: right;
            opacity: 0.7;
            font-size: 0.85em;
        }

        .item-quantity {
            text-align: center;
        }

        .qty-input {
            width: 50px;
            padding: 4px 6px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid rgba(0, 255, 65, 0.3);
            color: #00ff41;
            font-family: inherit;
            text-align: center;
            border-radius: 2px;
        }

        .qty-input:focus {
            outline: none;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
            border-color: #00ff41;
        }

        .item-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }

        .action-btn {
            padding: 4px 8px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid rgba(0, 255, 65, 0.3);
            color: #00ff41;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9em;
            transition: all 0.2s;
            border-radius: 2px;
        }

        .action-btn:hover {
            background: rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.3);
        }

        .action-btn.active {
            background: rgba(0, 255, 65, 0.3);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid rgba(0, 255, 65, 0.3);
            color: #00ff41;
            font-family: inherit;
            font-size: 0.9em;
            border-radius: 2px;
        }

        .search-input::placeholder {
            color: rgba(0, 255, 65, 0.5);
        }

        .search-input:focus {
            outline: none;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
            border-color: #00ff41;
        }

        .filter-btn {
            padding: 8px 12px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid rgba(0, 255, 65, 0.3);
            color: #00ff41;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            border-radius: 2px;
        }

        .filter-btn:hover {
            background: rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.3);
        }

        .filter-btn.active {
            background: rgba(0, 255, 65, 0.3);
            color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
        }

        .inventory-item:last-child {
            border-bottom: none;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #00aa00;
            opacity: 0.5;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 9999;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 255, 65, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 65, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 65, 0.4);
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <div class="inventory-container">
        <!-- Sidebar Categories -->
        <div class="sidebar">
            <div class="sidebar-title">Filter By</div>
            <button class="category-btn active" data-category="All Items">All Items</button>
            <button class="category-btn" data-category="Weapons">Weapons</button>
            <button class="category-btn" data-category="Armor">Armor</button>
            <button class="category-btn" data-category="Consumables">Consumables</button>
            <button class="category-btn" data-category="Miscellaneous">Miscellaneous</button>
            <button class="category-btn" data-category="Key Items">Key Items</button>
            
            <div class="sidebar-title" style="margin-top: 25px;">Sort By</div>
            <button class="sort-btn active" data-sort="name">Name</button>
            <button class="sort-btn" data-sort="weight">Weight</button>
            <button class="sort-btn" data-sort="value">Value</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="inventory-header">
                <h1>INVENTORY</h1>
                <div class="inventory-stats">
                    <div class="stat-line">
                        <div class="stat-label">Carry Weight</div>
                        <div class="stat-value" id="carryWeight">0 / 120 lbs</div>
                    </div>
                    <div class="stat-line">
                        <div class="stat-label">Total Items</div>
                        <div class="stat-value" id="totalItems">0</div>
                    </div>
                    <div class="stat-line">
                        <div class="stat-label">Total Value</div>
                        <div class="stat-value" id="totalValue">0</div>
                    </div>
                    <div class="stat-line">
                        <div class="stat-label">Equipped</div>
                        <div class="stat-value" id="equippedCount">0</div>
                    </div>
                </div>
                <div class="weight-bar" style="margin-top: 12px;">
                    <div class="weight-bar-fill"></div>
                </div>
            </div>

            <div class="filters">
                <input type="text" id="searchInput" class="search-input" placeholder="Search items...">
                <button class="filter-btn active">All</button>
                <button class="filter-btn">Favorites ⭐</button>
                <button class="filter-btn">New Items</button>
                <button class="filter-btn" id="addItemBtn">+ Add Item</button>
            </div>

            <div class="inventory-list"></div>
        </div>
    </div>
</body>
 <script type="module" src="./Script/Inventory.js"> </script> 
</html>
